services:
  db:
    image: postgres:16-alpine
    container_name: umbrella-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: umbrella
      POSTGRES_USER: umbrella
      POSTGRES_PASSWORD: umbrella
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U umbrella -d umbrella"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: umbrella-backend
    restart: unless-stopped
    environment:
      PORT: 4000
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: umbrella
      DB_USER: umbrella
      DB_PASSWORD: umbrella
      JWT_SECRET: umbrella-jwt-secret-change-in-production
      FRONTEND_URL: http://localhost
    ports:
      - "4000:4000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: umbrella-frontend
    restart: unless-stopped
    ports:
      - "8000:80"
    depends_on:
      - backend

volumes:
  pgdata:
